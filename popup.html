<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 15px; }
    .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #334155; padding-bottom: 10px; }
    .status-good { color: #22c55e; font-weight: bold; }
    .stat-card { background: #1e293b; padding: 10px; border-radius: 8px; margin-top: 10px; }
    .stat-num { font-size: 24px; color: #38bdf8; display: block; }
    button { width: 100%; background: #3b82f6; color: white; border: none; padding: 10px; border-radius: 5px; margin-top: 15px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="header">
    <span>SentinelGate</span>
    <span class="status-good">● ACTIVE</span>
  </div>
  <div class="stat-card">
    <span class="stat-num" id="leakCount">0</span>
    <small>Data Leaks Blocked Today</small>
  </div>
  <div class="stat-card">
    <small>Current Protection Level:</small>
    <strong style="color: #f59e0b;">Maximum (Zero-Trust)</strong>
  </div>
  <button id="viewLogs">View Detailed Logs</button>
</body>
</html>
